<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.Youngsim — Portfolio (Archivo ribbon)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");
  :root{ --ink:#0c0c0c; --paper:#ffffff; --disp:'Archivo'; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ font-family:'Pretendard','Inter',sans-serif; background:var(--ink); overflow-x:hidden; -webkit-font-smoothing:antialiased; }

  .scroll-wrap{ height:300vh; position:relative; }
  .stage{ height:100vh; width:100%; position:relative; overflow:hidden; background:var(--ink);
    display:flex; flex-direction:column; justify-content:center; gap:clamp(6px,1.4vw,18px); }

  /* the ribbon lines — text on one nowrap line, blended so it reads on any bg */
  .line{ white-space:nowrap; font-family:var(--disp),sans-serif; line-height:1;
    color:#fff; mix-blend-mode:difference; will-change:transform; }
  .line .seg{ display:inline-block; }
  .big{ font-weight:800; font-size:clamp(64px,15vw,210px); letter-spacing:-0.04em; }
  .thin{ font-weight:600; font-size:clamp(18px,3.2vw,44px); letter-spacing:0.02em; opacity:0.9; }
  .sep{ display:inline-block; margin:0 0.35em; font-weight:400; }

  /* fixed editorial labels */
  .label{ position:absolute; font-family:var(--disp),sans-serif; font-weight:700; font-size:clamp(11px,1.1vw,13px);
    letter-spacing:0.2em; text-transform:uppercase; color:#fff; mix-blend-mode:difference; z-index:3; }
  .lab-tl{ top:clamp(24px,5vw,52px); left:clamp(24px,5vw,52px); }
  .lab-tr{ top:clamp(24px,5vw,52px); right:clamp(24px,5vw,52px); text-align:right; }
  .cue{ position:absolute; bottom:clamp(22px,4vw,42px); left:50%; transform:translateX(-50%); z-index:3;
    color:#fff; mix-blend-mode:difference; font-family:'Inter'; font-size:11px; letter-spacing:0.22em; }

  .tail{ background:var(--paper); color:var(--ink); text-align:center; padding:14vh 6vw 16vh; }
  .tail .t1{ font-family:var(--disp),sans-serif; font-weight:800; font-size:clamp(28px,4.5vw,52px); letter-spacing:-0.02em; }
  .tail .t2{ color:#6b6b6b; font-size:14px; margin-top:14px; }
</style>
</head>
<body>
  <div class="scroll-wrap" id="scrollWrap">
    <div class="stage" id="stage">
      <span class="label lab-tl">J.Youngsim</span>
      <span class="label lab-tr">Selected works<br>2024 — 2026</span>

      <!-- thin line drifts right -->
      <div class="line thin" id="lineThin"><span class="seg" id="segThin"></span></div>
      <!-- big line flows left -->
      <div class="line big" id="lineBig"><span class="seg" id="segBig"></span></div>

      <div class="cue" id="cue">SCROLL →</div>
    </div>
  </div>

  <section class="tail">
    <div class="t1">Selected works ↓</div>
    <div class="t2">여기에 실제 프로젝트 섹션이 이어집니다</div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    /* build a long continuous chain so the text always overflows the screen */
    const unitBig  = 'J.Youngsim <span class="sep">—</span> Portfolio <span class="sep">—</span> ';
    const unitThin = 'Brand &amp; UX &nbsp;·&nbsp; Editorial &nbsp;·&nbsp; UI/UX &nbsp;·&nbsp; ';
    document.getElementById('segBig').innerHTML  = unitBig.repeat(8);
    document.getElementById('segThin').innerHTML = unitThin.repeat(10);

    /* start the big line shifted so content covers both edges */
    gsap.set('#lineBig',  { xPercent:-12 });
    gsap.set('#lineThin', { xPercent:-40 });

    const tl = gsap.timeline({
      scrollTrigger:{ trigger:'#scrollWrap', start:'top top', end:'bottom bottom', pin:'#stage', scrub:0.6 }
    });

    /* background black -> white (text auto-inverts via mix-blend difference) */
    tl.to('#stage', { backgroundColor:'#ffffff', ease:'none', duration:1 }, 0);
    /* the two lines flow horizontally at different speeds → "글씨가 이어지는" 리본 */
    tl.to('#lineBig',  { xPercent:-62, ease:'none', duration:1 }, 0);
    tl.to('#lineThin', { xPercent:-8,  ease:'none', duration:1 }, 0);
    /* scroll cue fades as you go */
    tl.to('#cue', { autoAlpha:0, ease:'none', duration:0.4 }, 0);
  </script>
</body>
</html>
